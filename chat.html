<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Diagnostics Monitor</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        body { 
            background-color: #000000; 
            color: #d1d5db; 
            font-family: 'Courier New', Courier, monospace; 
            user-select: none; 
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
            height: 100dvh; /* Altura dinâmica rigorosa para respeitar o teclado */
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1a1a1a; }

        .secure-overlay { display: none; }
        .secure-overlay.active { display: flex; }

        input:focus { outline: none; }
        
        .blur-active { 
            opacity: 0.15; 
            transition: opacity 0.5s; 
            pointer-events: none; 
        }

        .log-line { margin-bottom: 4px; font-size: 13px; line-height: 1.3; word-break: break-all; }
        .log-time { color: #4b5563; font-size: 11px; } 
        .log-local { color: #22c55e; } 
        .log-remote { color: #3b82f6; } 
        
        /* Cor da mensagem real (camuflada para não chamar atenção de longe) */
        .msg-text { color: #9ca3af; font-weight: bold; }
        /* Lixo visual para confundir espiões */
        .sys-garbage { color: #374151; font-size: 11px; }
    </style>
</head>
<body>

    <div id="prtscr-overlay" class="secure-overlay absolute inset-0 bg-black z-50 items-center justify-center flex-col">
        <p style="color: red; font-size: 14px;">[FATAL ERROR] BUFFER OVERFLOW AT 0x0000FF.</p>
        <p style="color: gray; font-size: 12px;">SYSTEM HALTED.</p>
    </div>

    <div id="full-overlay" class="secure-overlay absolute inset-0 bg-black z-50 items-center justify-center">
        <p style="color: orange; font-size: 14px;">[WARN] SOCKET LIMIT REACHED (2/2). CONNECTION REFUSED.</p>
    </div>

    <div id="app-container" class="flex flex-col h-full w-full max-w-4xl mx-auto relative transition-all duration-300">
        
        <header class="bg-[#050505] border-b border-gray-900 p-2 flex justify-between items-start z-10 shrink-0">
            <div>
                <h1 class="text-xs text-gray-600 font-bold tracking-wider">SYS.DIAG_v2.4</h1>
                <div id="status-indicator" class="text-[10px] text-gray-700 mt-1">
                    [STATUS] Aguardando handshake...
                </div>
            </div>
            <button id="copy-link-btn" class="text-[10px] text-gray-600 hover:text-white border border-gray-800 px-2 py-1 bg-black">
                [ EXPORTAR ]
            </button>
        </header>

        <main id="messages-container" class="flex-1 overflow-y-auto p-3 bg-black scroll-smooth flex flex-col">
            <div class="flex-1"></div> 
            
            <div id="logs-wrapper" class="flex flex-col gap-1 w-full pb-2">
                </div>
        </main>

        <div id="typing-bubble" class="hidden text-[10px] text-gray-700 px-3 py-1 bg-[#050505] border-t border-gray-900 shrink-0">
            > streaming_data...
        </div>

        <footer class="bg-black border-t border-gray-900 w-full shrink-0 pb-1">
            <form id="chat-form" class="flex items-center w-full p-2">
                <span class="text-green-600 text-xs mr-2 ml-1">root:~#</span>
                <input type="text" id="message-input" autocomplete="off" spellcheck="false"
                    class="flex-1 bg-black text-gray-400 py-1 text-sm font-mono border-none focus:ring-0">
                <button type="submit" class="hidden"></button>
            </form>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, onSnapshot, addDoc, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // CREDENCIAIS FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDWXtdoYRTfJJA1zeOXAeN9S1-1B2OB5zc",
            authDomain: "chat-c6543.firebaseapp.com",
            projectId: "chat-c6543",
            storageBucket: "chat-c6543.firebasestorage.app",
            messagingSenderId: "477564400024",
            appId: "1:477564400024:web:d08349e3dec77ca5e37bed"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let myUserId = localStorage.getItem('sys_session_id');
        if (!myUserId) {
            myUserId = "UID_" + Math.random().toString(16).substring(2, 10);
            localStorage.setItem('sys_session_id', myUserId);
        }

        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room');
        
        if (!roomId) {
            roomId = "NET_" + Math.random().toString(16).substring(2, 10);
            window.history.replaceState({}, '', `?room=${roomId}`);
        }

        const roomRef = doc(db, "rooms", roomId);
        const messagesRef = collection(roomRef, "messages");

        const messagesContainer = document.getElementById('messages-container');
        const logsWrapper = document.getElementById('logs-wrapper');
        const messageInput = document.getElementById('message-input');
        const chatForm = document.getElementById('chat-form');
        const statusIndicator = document.getElementById('status-indicator');
        const appContainer = document.getElementById('app-container');
        const typingBubble = document.getElementById('typing-bubble');
        const copyBtn = document.getElementById('copy-link-btn');

        window.addEventListener('resize', scrollToBottom);
        messageInput.addEventListener('focus', () => {
            setTimeout(scrollToBottom, 300);
        });

        document.body.addEventListener('click', (e) => {
            if(e.target.id !== 'copy-link-btn') {
                messageInput.focus();
            }
        });

        document.addEventListener('contextmenu', e => e.preventDefault());
        window.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'PrintScreen') {
                const overlay = document.getElementById('prtscr-overlay');
                overlay.classList.add('active'); 
                navigator.clipboard.writeText('ERR_MEMORY_DUMP'); 
                setTimeout(() => overlay.classList.remove('active'), 2000);
            }
        });

        window.addEventListener('blur', () => appContainer.classList.add('blur-active'));
        window.addEventListener('focus', () => appContainer.classList.remove('blur-active'));

        copyBtn.addEventListener('click', (e) => {
            e.stopPropagation(); 
            const currentUrl = window.location.href;
            navigator.clipboard.writeText(currentUrl);
            copyBtn.innerText = "[ COPIADO ]";
            copyBtn.style.color = "#22c55e"; 
            setTimeout(() => {
                copyBtn.innerText = "[ EXPORTAR ]";
                copyBtn.style.color = ""; 
            }, 2000);
        });

        async function initRoom() {
            try {
                const roomSnap = await getDoc(roomRef);
                
                if (!roomSnap.exists()) {
                    await setDoc(roomRef, { users: [myUserId], typing: null });
                } else {
                    const data = roomSnap.data();
                    if (!data.users.includes(myUserId)) {
                        if (data.users.length >= 2) {
                            document.getElementById('full-overlay').classList.add('active');
                            return;
                        } else {
                            await updateDoc(roomRef, { users: [...data.users, myUserId] });
                        }
                    }
                }

                onSnapshot(roomRef, (docSnap) => {
                    const data = docSnap.data();
                    if (data && data.users.length === 2) {
                        if (data.typing && data.typing !== myUserId) {
                            statusIndicator.innerText = "[STATUS] sync_active: recebendo pacotes...";
                            typingBubble.classList.remove('hidden');
                            scrollToBottom();
                        } else {
                            statusIndicator.innerText = "[STATUS] tcp_connected: criptografia ligada.";
                            typingBubble.classList.add('hidden');
                        }
                    } else {
                        statusIndicator.innerText = "[STATUS] awaiting_host...";
                        typingBubble.classList.add('hidden');
                    }
                });

                const q = query(messagesRef, orderBy("timestamp", "asc"));
                onSnapshot(q, (snapshot) => {
                    const initialLogs = `<div class="log-line sys-garbage">SYS_INIT: carregar módulos kernel... 0x00 OK</div><div class="log-line sys-garbage">SEC_PROTOCOL: porta aberta escuta... 0x01 OK</div>`;
                    logsWrapper.innerHTML = initialLogs; 
                    
                    snapshot.forEach((docSnap) => {
                        const msgData = docSnap.data();
                        const now = new Date().getTime();
                        const msgTime = msgData.timestamp ? msgData.timestamp.toMillis() : now;
                        
                        if (now - msgTime > 600000) { 
                            deleteDoc(docSnap.ref);
                            return;
                        }

                        let decryptedText = "";
                        try {
                            const bytes = CryptoJS.AES.decrypt(msgData.text, roomId);
                            decryptedText = bytes.toString(CryptoJS.enc.Utf8);
                            if (!decryptedText) throw new Error();
                        } catch (e) {
                            decryptedText = "ERR_CORRUPT";
                        }

                        const dateObj = msgData.timestamp ? msgData.timestamp.toDate() : new Date();
                        const timeString = dateObj.toLocaleTimeString('pt-BR');

                        renderMessage(timeString, decryptedText, msgData.senderId === myUserId);

                        if (msgData.senderId !== myUserId) {
                            setTimeout(() => {
                                deleteDoc(docSnap.ref);
                            }, 600000); 
                        }
                    });
                    scrollToBottom();
                });
            } catch (error) {
                console.error("Erro de conexão:", error);
                statusIndicator.innerText = "[ERRO] falha_banco_dados";
            }
        }

        // Função geradora de strings aleatórias para a camuflagem
        function getFakeHex() {
            return Math.random().toString(16).substring(2, 6).toUpperCase();
        }

        function renderMessage(timeString, text, isMine) {
            const div = document.createElement('div');
            div.className = "log-line flex items-start flex-wrap";
            
            const prefix = isMine 
                ? `<span class="log-local mr-1">[LOC] req:</span>` 
                : `<span class="log-remote mr-1">[REM] res:</span>`;

            // Adicionando a "camuflagem" em volta da mensagem
            const fakeHexStart = `{0x${getFakeHex()}}`;
            const fakeHexEnd = `->[0x${getFakeHex()}]`;

            div.innerHTML = `
                <span class="log-time mr-1">[${timeString}]</span> 
                ${prefix} 
                <span class="sys-garbage ml-1 mr-1">${fakeHexStart}</span> 
                <span class="msg-text">${text}</span> 
                <span class="sys-garbage ml-1">${fakeHexEnd}</span>
            `;
            
            logsWrapper.appendChild(div);
        }

        function scrollToBottom() {
            setTimeout(() => {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, 50);
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text) return;

            const encryptedText = CryptoJS.AES.encrypt(text, roomId).toString();
            messageInput.value = ''; 
            messageInput.focus();    
            await updateDoc(roomRef, { typing: null });

            await addDoc(messagesRef, {
                text: encryptedText,
                senderId: myUserId,
                timestamp: serverTimestamp()
            });
            scrollToBottom();
        });

        let typingTimeout;
        messageInput.addEventListener('input', () => {
            updateDoc(roomRef, { typing: myUserId });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => updateDoc(roomRef, { typing: null }), 1000);
        });

        messageInput.focus();
        initRoom();
    </script>
</body>
</html>
